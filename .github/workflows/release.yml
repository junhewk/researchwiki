name: release

# Build distributable artifacts for macOS and Windows. Runs on a version tag
# (e.g. `git tag v0.1.0 && git push --tags`) and can be triggered manually.
# Prompts and icons are embedded in the binary, so the artifacts are self-contained.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # --- macOS: bundle into a .app, ad-hoc sign, package a signed DMG ---
      # Ad-hoc signing (no Apple Developer ID / notarization) keeps macOS from
      # treating the nested binary as "damaged"; users still bypass Gatekeeper
      # once via control-click → Open (see README).
      - name: Install cargo-bundle (macOS)
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle
      - name: Bundle, sign, and package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo bundle --release
          APP="target/release/bundle/osx/ResearchWiki.app"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          hdiutil create -volname "ResearchWiki" \
            -srcfolder "$APP" -ov -format UDZO \
            "ResearchWiki-macos.dmg"
          codesign --force --sign - "ResearchWiki-macos.dmg"
          codesign --verify --verbose=2 "ResearchWiki-macos.dmg"
      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ResearchWiki-macos
          path: ResearchWiki-macos.dmg

      # --- Windows: build the exe and zip it ---
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/researchwiki.exe -DestinationPath ResearchWiki-windows.zip
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ResearchWiki-windows
          path: ResearchWiki-windows.zip

      # --- Attach to the GitHub Release when building a tag ---
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ResearchWiki-macos.dmg
            ResearchWiki-windows.zip
          fail_on_unmatched_files: false
