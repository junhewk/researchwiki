name: release

# Build distributable artifacts for macOS and Windows. Runs on a version tag
# (e.g. `git tag v0.1.0 && git push --tags`) and can be triggered manually.
# Prompts and icons are embedded in the binary, so the artifacts are self-contained.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # --- macOS: bundle into a .app, ad-hoc sign, package a signed DMG ---
      # Ad-hoc signing (no Apple Developer ID / notarization) keeps macOS from
      # treating the nested binary as "damaged"; users still bypass Gatekeeper
      # once via control-click → Open (see README).
      - name: Install cargo-bundle (macOS)
        if: runner.os == 'macOS'
        # --locked uses cargo-bundle's pinned deps so the install doesn't pull a
        # transitive crate that demands a newer rustc than the runner's stable.
        run: cargo install cargo-bundle --locked
      - name: Bundle, sign, and package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo bundle --release --bin researchwiki
          APP="target/release/bundle/osx/ResearchWiki.app"
          DMG_ROOT="target/release/dmg-root"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          ditto "$APP" "$DMG_ROOT/ResearchWiki.app"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create -volname "ResearchWiki" \
            -srcfolder "$DMG_ROOT" -ov -format UDZO \
            "ResearchWiki-macos.dmg"
          codesign --force --sign - "ResearchWiki-macos.dmg"
          codesign --verify --verbose=2 "ResearchWiki-macos.dmg"
      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ResearchWiki-macos
          path: ResearchWiki-macos.dmg
          if-no-files-found: error

      # --- Windows: build the exe and zip a portable app folder ---
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --bin researchwiki
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/ResearchWiki
          Copy-Item target/release/researchwiki.exe dist/ResearchWiki/ResearchWiki.exe
          Compress-Archive -Path dist/ResearchWiki -DestinationPath ResearchWiki-windows.zip
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ResearchWiki-windows
          path: ResearchWiki-windows.zip
          if-no-files-found: error

  release:
    name: Attach release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -maxdepth 2 -type f
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
